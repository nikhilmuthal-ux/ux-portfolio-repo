  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

mal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"781fadb2-b8d0-4cd3-8f24-f485dfc23f50\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"f2b29575-1704-4161-8be9-acca9941f67b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"134842e5-1353-42f8-8120-a0b82e3aae1c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html { scroll-behavior: smooth; }\n  body { margin:0; background:#EEF1F5; color:#14181F; font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }\n  a { color:#1F5CFF; text-decoration:none; }\n  a:hover { color:#1B3268; }\n  ::selection { background:#1F5CFF; color:#fff; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<!-- ============ HERO ============ -->\n<section style=\"background:#14181F;color:#EEF1F5;padding:clamp(80px,14vh,150px) 6vw clamp(70px,10vh,110px);position:relative;overflow:hidden;\">\n  <div style=\"max-width:1160px;margin:0 auto;position:relative;z-index:2;\">\n    <div style=\"font:600 13px/1 Inter,sans-serif;letter-spacing:.22em;text-transform:uppercase;color:#5E8AFF;margin-bottom:34px;\">Case Study · Problem &amp; Solution<\u002Fdiv>\n    <h1 style=\"font:600 clamp(46px,8.5vw,104px)/0.98 'Playfair Display',serif;letter-spacing:-.02em;margin:0 0 8px;\">DartCharge<\u002Fh1>\n    <p style=\"font:400 clamp(22px,3vw,38px)/1.2 'Playfair Display',serif;font-style:italic;color:#E6EBF1;margin:0 0 40px;max-width:20ch;\">Redesigning toll payments for the Dartford Crossing<\u002Fp>\n    <p style=\"font:400 clamp(16px,1.4vw,19px)/1.7 Inter,sans-serif;color:#9BA7B7;max-width:56ch;margin:0 0 52px;\">A road you cross at full speed, a fine that arrives in the post, and a payment system most people meet only after they have already failed it. This is how it was redesigned, the problems, the evidence, and the design decisions behind each fix.<\u002Fp>\n    <div style=\"display:flex;flex-wrap:wrap;gap:14px 40px;\">\n      <div><div style=\"font:600 12px Inter;letter-spacing:.14em;text-transform:uppercase;color:#616B7B;\">Role<\u002Fdiv><div style=\"font:500 16px Inter;color:#E6EBF1;margin-top:6px;\">Product / UX Design<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font:600 12px Inter;letter-spacing:.14em;text-transform:uppercase;color:#616B7B;\">Surface<\u002Fdiv><div style=\"font:500 16px Inter;color:#E6EBF1;margin-top:6px;\">Web &amp; mobile service<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font:600 12px Inter;letter-spacing:.14em;text-transform:uppercase;color:#616B7B;\">Focus<\u002Fdiv><div style=\"font:500 16px Inter;color:#E6EBF1;margin-top:6px;\">Payments, deadlines, trust<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font:600 12px Inter;letter-spacing:.14em;text-transform:uppercase;color:#616B7B;\">Status<\u002Fdiv><div style=\"font:500 16px Inter;color:#E6EBF1;margin-top:6px;\">Draft · visuals evolving<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;right:-6vw;bottom:-8vh;font:600 clamp(160px,30vw,420px)/0.8 'Bodoni Moda',serif;color:#1A2230;z-index:1;user-select:none;\">70<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CONTEXT ============ -->\n<section id=\"context\" style=\"padding:clamp(72px,10vh,128px) 6vw;\">\n  <div style=\"max-width:1160px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"font:600 13px/1 Inter,sans-serif;letter-spacing:.18em;text-transform:uppercase;color:#1F5CFF;margin-bottom:22px;\">Context<\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font:600 clamp(32px,5vw,60px)/1.02 'Playfair Display',serif;letter-spacing:-.01em;margin:0 0 26px;max-width:15ch;\">A toll with no tollbooth<\u002Fh2>\n    <p data-reveal=\"\" style=\"font:400 clamp(17px,1.4vw,20px)/1.65 Inter,sans-serif;color:#2C333E;max-width:62ch;margin:0 0 56px;\">Since 2014 the Dartford Crossing has had no toll booths and no barriers. Cameras read number plates at full speed. Drivers must know, <span style=\"background:linear-gradient(180deg,transparent 62%,#C6D3F4 62%);padding:0 .1em;border-radius:1px;box-decoration-break:clone;-webkit-box-decoration-break:clone;\">entirely on their own<\u002Fspan>, that they have to pay later, a rule the road never stops to explain.<\u002Fp>\n\n    <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;gap:0;align-items:stretch;border:1px solid #D6DCE4;border-radius:18px;overflow:hidden;background:#D6DCE4;\">\n      <div style=\"flex:1 1 240px;background:#F9FBFD;padding:34px 30px;\">\n        <div style=\"font:600 13px Inter;letter-spacing:.1em;text-transform:uppercase;color:#1F5CFF;margin-bottom:14px;\">Step 01<\u002Fdiv>\n        <div style=\"font:600 22px/1.2 'Playfair Display',serif;margin-bottom:12px;\">You cross at 70 mph<\u002Fdiv>\n        <div style=\"font:400 15px/1.55 Inter;color:#566070;\">No booth, no barrier. Many first-time drivers do not know they have to pay at all.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:center;background:#EEF1F5;padding:0 6px;font-size:22px;color:#767F8E;\">→<\u002Fdiv>\n      <div style=\"flex:1 1 240px;background:#F9FBFD;padding:34px 30px;\">\n        <div style=\"font:600 13px Inter;letter-spacing:.1em;text-transform:uppercase;color:#1F5CFF;margin-bottom:14px;\">Step 02<\u002Fdiv>\n        <div style=\"font:600 22px/1.2 'Playfair Display',serif;margin-bottom:12px;\">Pay by midnight tomorrow<\u002Fdiv>\n        <div style=\"font:400 15px/1.55 Inter;color:#566070;\">You get roughly 24 to 48 hours to pay. Roadside signs are the only warning you will ever see.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:center;background:#EEF1F5;padding:0 6px;font-size:22px;color:#767F8E;\">→<\u002Fdiv>\n      <div style=\"flex:1 1 240px;background:#1E2A3A;padding:34px 30px;color:#F3E6E6;\">\n        <div style=\"font:600 13px Inter;letter-spacing:.1em;text-transform:uppercase;color:#F2A6A6;margin-bottom:14px;\">Miss it<\u002Fdiv>\n        <div style=\"font:600 22px/1.2 'Bodoni Moda',serif;margin-bottom:12px;color:#fff;\">£2.50 becomes £70<\u002Fdiv>\n        <div style=\"font:400 15px/1.55 Inter;color:#EBC7C7;\">A £70 fine is posted to the vehicle owner. Ignore it and it climbs to £105.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:1px;background:#D6DCE4;border:1px solid #D6DCE4;border-radius:18px;overflow:hidden;margin-top:22px;\">\n      <div style=\"background:#EEF1F5;padding:30px 26px;\">\n        <div style=\"font:600 clamp(30px,3.6vw,46px)/1 'Bodoni Moda',serif;\"><span data-target=\"50000\">50,000<\u002Fspan>+<\u002Fdiv>\n        <div style=\"font:500 14px Inter;color:#636D7D;margin-top:12px;\">vehicles every day<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#EEF1F5;padding:30px 26px;\">\n        <div style=\"font:600 clamp(30px,3.6vw,46px)/1 'Bodoni Moda',serif;\">£<span data-target=\"3.5\" data-decimals=\"2\">3.50<\u002Fspan><\u002Fdiv>\n        <div style=\"font:500 14px Inter;color:#636D7D;margin-top:12px;\">car charge per crossing<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#EEF1F5;padding:30px 26px;\">\n        <div style=\"font:600 clamp(30px,3.6vw,46px)/1 'Bodoni Moda',serif;display:flex;align-items:center;gap:6px;flex-wrap:wrap;\">£70<span style=\"color:#E5484D;\">→<\u002Fspan>£105<\u002Fdiv>\n        <div style=\"font:500 14px Inter;color:#636D7D;margin-top:12px;\">penalty escalation<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#EEF1F5;padding:30px 26px;\">\n        <div style=\"font:600 clamp(30px,3.6vw,46px)/1 'Bodoni Moda',serif;\"><span data-target=\"28\">28<\u002Fspan> days<\u002Fdiv>\n        <div style=\"font:500 14px Inter;color:#636D7D;margin-top:12px;\">to appeal a PCN<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ THE PROBLEM ============ -->\n<section id=\"problem\" style=\"background:#14181F;color:#EEF1F5;padding:clamp(80px,11vh,136px) 6vw;\">\n  <div style=\"max-width:1160px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"font:600 13px/1 Inter,sans-serif;letter-spacing:.18em;text-transform:uppercase;color:#5E8AFF;margin-bottom:22px;\">The Problem<\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font:600 clamp(32px,5vw,60px)/1.02 'Playfair Display',serif;letter-spacing:-.01em;margin:0 0 26px;max-width:18ch;\">When a payment system fails, users pay twice<\u002Fh2>\n    <p data-reveal=\"\" style=\"font:400 clamp(17px,1.4vw,20px)/1.65 Inter,sans-serif;color:#A3AFBF;max-width:60ch;margin:0 0 60px;\">Most fines happened because of confusion, not cheating. People wanted to pay, <span style=\"color:#9DB4EC;font-style:normal;\">the system made it hard.<\u002Fspan><\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:36px 30px;min-width:0;\">\n      <div data-reveal=\"\" style=\"border-top:2px solid #5E8AFF;padding-top:22px;\">\n        <div style=\"font:600 clamp(30px,3.6vw,46px)/1 'Bodoni Moda',serif;color:#fff;overflow-wrap:break-word;\"><span data-target=\"277000\">277,000<\u002Fspan><\u002Fdiv>\n        <div style=\"font:400 15px/1.5 Inter;color:#9BA7B7;margin-top:16px;\">PCNs issued per month at the 2024 peak<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"border-top:2px solid #5E8AFF;padding-top:22px;\">\n        <div style=\"font:600 clamp(30px,3.6vw,46px)/1 'Bodoni Moda',serif;color:#fff;overflow-wrap:break-word;\">+<span data-target=\"50\">50<\u002Fspan>%<\u002Fdiv>\n        <div style=\"font:400 15px/1.5 Inter;color:#9BA7B7;margin-top:16px;\">rise in monthly penalties after the 2023 system changeover<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"border-top:2px solid #5E8AFF;padding-top:22px;\">\n        <div style=\"font:600 clamp(30px,3.6vw,46px)/1 'Bodoni Moda',serif;color:#fff;overflow-wrap:break-word;\">~<span data-target=\"1000000\">1,000,000<\u002Fspan><\u002Fdiv>\n        <div style=\"font:400 15px/1.5 Inter;color:#9BA7B7;margin-top:16px;\">account holders whose card details expired without warning<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"border-top:2px solid #5E8AFF;padding-top:22px;\">\n        <div style=\"font:600 clamp(30px,3.6vw,46px)/1 'Bodoni Moda',serif;color:#fff;overflow-wrap:break-word;\"><span data-target=\"70\">70<\u002Fspan>th<\u002Fdiv>\n        <div style=\"font:400 15px/1.5 Inter;color:#9BA7B7;margin-top:16px;\">in queue, a typical call-centre wait reported by users<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p data-reveal=\"\" style=\"font:400 13px/1.6 Inter;color:#616B7B;max-width:64ch;margin:52px 0 0;font-style:italic;\">These figures come from public reporting (Fleet News, National Highways). They set the background, they are not primary research from this project.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ PROBLEM LANDSCAPE ============ -->\n<section id=\"landscape\" style=\"padding:clamp(72px,10vh,128px) 6vw;\">\n  <div style=\"max-width:1160px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"font:600 13px/1 Inter,sans-serif;letter-spacing:.18em;text-transform:uppercase;color:#1F5CFF;margin-bottom:22px;\">Problem Landscape<\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font:600 clamp(32px,5vw,60px)/1.02 'Playfair Display',serif;letter-spacing:-.01em;margin:0 0 20px;max-width:20ch;\"><span data-target=\"18\" style=\"font-family:'Bodoni Moda',serif;\">18<\u002Fspan> failure points across five audiences<\u002Fh2>\n    <p data-reveal=\"\" style=\"font:400 clamp(17px,1.4vw,20px)/1.65 Inter,sans-serif;color:#2C333E;max-width:62ch;margin:0 0 46px;\">Every gap led to a support call, or a fine. Mapped across the five audiences the old service let down.<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;align-items:start;\">\n\n      <div data-reveal=\"\" style=\"grid-column:span 1;background:#F5F8FB;border:1px solid #D6DCE4;border-radius:18px;padding:28px 26px;display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;\">\n          <div>\n            <div style=\"font:600 12px Inter;letter-spacing:.14em;text-transform:uppercase;color:#636D7D;margin-bottom:10px;\">5 gaps<\u002Fdiv>\n            <div style=\"font:500 clamp(22px,2.4vw,28px)/1.1 'Playfair Display',serif;color:#14181F;\">First-time drivers<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"flex:none;font:600 clamp(34px,3.4vw,46px)/1 'Bodoni Moda',serif;color:#1F5CFF;\">5<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:9px;\"><span style=\"font:500 13.5px/1.35 Inter;color:#2C333E;background:#FFFFFF;border:1px solid #D6DCE4;border-radius:10px;padding:9px 13px;\">No booth, no barrier, drivers don’t know they must pay<\u002Fspan><span style=\"font:500 13.5px/1.35 Inter;color:#2C333E;background:#FFFFFF;border:1px solid #D6DCE4;border-radius:10px;padding:9px 13px;\">A hidden midnight deadline<\u002Fspan><span style=\"font:500 13.5px/1.35 Inter;color:#2C333E;background:#FFFFFF;border:1px solid #D6DCE4;border-radius:10px;padding:9px 13px;\">Paying for the wrong date goes unnoticed<\u002Fspan><span style=\"font:500 13.5px/1.35 Inter;color:#2C333E;background:#FFFFFF;border:1px solid #D6DCE4;border-radius:10px;padding:9px 13px;\">“Did I already pay?” has no answer<\u002Fspan><span style=\"font:500 13.5px/1.35 Inter;color:#2C333E;background:#FFFFFF;border:1px solid #D6DCE4;border-radius:10px;padding:9px 13px;\">Fake payment websites<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:18px;padding:28px 26px;display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;\">\n          <div>\n            <div style=\"font:600 12px Inter;letter-spacing:.14em;text-transform:uppercase;color:#636D7D;margin-bottom:10px;\">5 gaps<\u002Fdiv>\n            <div style=\"font:500 clamp(22px,2.4vw,28px)/1.1 'Playfair Display',serif;color:#14181F;\">Account holders<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"flex:none;font:600 clamp(34px,3.4vw,46px)/1 'Bodoni Moda',serif;color:#1F5CFF;\">5<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:9px;\"><span style=\"font:500 13.5px/1.35 Inter;color:#2C333E;background:#FFFFFF;border:1px solid #D6DCE4;border-radius:10px;padding:9px 13px;\">Accounts close quietly, without warning<\u002Fspan><span style=\"font:500 13.5px/1.35 Inter;color:#2C333E;background:#FFFFFF;border:1px solid #D6DCE4;border-radius:10px;padding:9px 13px;\">Expired cards cause fines, not warnings<\u002Fspan><span style=\"font:500 13.5px/1.35 Inter;color:#2C333E;background:#FFFFFF;border:1px solid #D6DCE4;border-radius:10px;padding:9px 13px;\">Unclear top-ups and missing payments<\u002Fspan><span style=\"font:500 13.5px/1.35 Inter;color:#2C333E;background:#FFFFFF;border:1px solid #D6DCE4;border-radius:10px;padding:9px 13px;\">No way to switch account type<\u002Fspan><span style=\"font:500 13.5px/1.35 Inter;color:#2C333E;background:#FFFFFF;border:1px solid #D6DCE4;border-radius:10px;padding:9px 13px;\">Problems when adding or changing vehicles<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:18px;padding:28px 26px;display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;\">\n          <div>\n            <div style=\"font:600 12px Inter;letter-spacing:.14em;text-transform:uppercase;color:#636D7D;margin-bottom:10px;\">2 gaps<\u002Fdiv>\n            <div style=\"font:500 clamp(22px,2.4vw,28px)/1.1 'Playfair Display',serif;color:#14181F;\">Business &amp; fleets<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"flex:none;font:600 clamp(34px,3.4vw,46px)/1 'Bodoni Moda',serif;color:#1F5CFF;\">2<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:9px;\"><span style=\"font:500 13.5px/1.35 Inter;color:#2C333E;background:#FFFFFF;border:1px solid #D6DCE4;border-radius:10px;padding:9px 13px;\">Fined even with money in the account<\u002Fspan><span style=\"font:500 13.5px/1.35 Inter;color:#2C333E;background:#FFFFFF;border:1px solid #D6DCE4;border-radius:10px;padding:9px 13px;\">No way to manage many vehicles at once<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:18px;padding:28px 26px;display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;\">\n          <div>\n            <div style=\"font:600 12px Inter;letter-spacing:.14em;text-transform:uppercase;color:#636D7D;margin-bottom:10px;\">3 gaps<\u002Fdiv>\n            <div style=\"font:500 clamp(22px,2.4vw,28px)/1.1 'Playfair Display',serif;color:#14181F;\">Penalties &amp; appeals<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"flex:none;font:600 clamp(34px,3.4vw,46px)/1 'Bodoni Moda',serif;color:#1F5CFF;\">3<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:9px;\"><span style=\"font:500 13.5px/1.35 Inter;color:#2C333E;background:#FFFFFF;border:1px solid #D6DCE4;border-radius:10px;padding:9px 13px;\">Appeals get lost, no reference number<\u002Fspan><span style=\"font:500 13.5px/1.35 Inter;color:#2C333E;background:#FFFFFF;border:1px solid #D6DCE4;border-radius:10px;padding:9px 13px;\">The fine keeps growing during an appeal<\u002Fspan><span style=\"font:500 13.5px/1.35 Inter;color:#2C333E;background:#FFFFFF;border:1px solid #D6DCE4;border-radius:10px;padding:9px 13px;\">Fines sent to old addresses<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:18px;padding:28px 26px;display:flex;flex-direction:column;gap:20px;\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;\">\n          <div>\n            <div style=\"font:600 12px Inter;letter-spacing:.14em;text-transform:uppercase;color:#636D7D;margin-bottom:10px;\">3 gaps<\u002Fdiv>\n            <div style=\"font:500 clamp(22px,2.4vw,28px)/1.1 'Playfair Display',serif;color:#14181F;\">Underserved users<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"flex:none;font:600 clamp(34px,3.4vw,46px)/1 'Bodoni Moda',serif;color:#1F5CFF;\">3<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:9px;\"><span style=\"font:500 13.5px/1.35 Inter;color:#2C333E;background:#FFFFFF;border:1px solid #D6DCE4;border-radius:10px;padding:9px 13px;\">Foreign drivers know the rules the least<\u002Fspan><span style=\"font:500 13.5px/1.35 Inter;color:#2C333E;background:#FFFFFF;border:1px solid #D6DCE4;border-radius:10px;padding:9px 13px;\">Hire-car drivers pay the fine plus extra fees<\u002Fspan><span style=\"font:500 13.5px/1.35 Inter;color:#2C333E;background:#FFFFFF;border:1px solid #D6DCE4;border-radius:10px;padding:9px 13px;\">Long phone queues are the only help<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ RESEARCH ============ -->\n<section id=\"research\" style=\"padding:clamp(72px,10vh,128px) 6vw;background:#E3E8EF;\">\n  <div style=\"max-width:1160px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"font:600 13px/1 Inter,sans-serif;letter-spacing:.18em;text-transform:uppercase;color:#1F5CFF;margin-bottom:22px;\">Research &amp; Discovery<\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font:600 clamp(32px,5vw,60px)/1.02 'Playfair Display',serif;letter-spacing:-.01em;margin:0 0 46px;max-width:16ch;\">From evidence to insight<\u002Fh2>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:44px;align-items:start;\">\n      <div data-reveal=\"\">\n        <div style=\"font:600 13px Inter;letter-spacing:.1em;text-transform:uppercase;color:#636D7D;margin-bottom:20px;\">What we examined<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:14px;\">\n          <div style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:12px;padding:18px 20px;\"><div style=\"font:600 16px Inter;margin-bottom:5px;\">Contact-centre themes<\u002Fdiv><div style=\"font:400 14px/1.5 Inter;color:#566070;\">The most common questions and complaints<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:12px;padding:18px 20px;\"><div style=\"font:600 16px Inter;margin-bottom:5px;\">Payment funnel<\u002Fdiv><div style=\"font:400 14px/1.5 Inter;color:#566070;\">Where users quit in the old payment journey<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:12px;padding:18px 20px;\"><div style=\"font:600 16px Inter;margin-bottom:5px;\">Heuristic review<\u002Fdiv><div style=\"font:400 14px/1.5 Inter;color:#566070;\">Old screens vs UK government design standards<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:12px;padding:18px 20px;\"><div style=\"font:600 16px Inter;margin-bottom:5px;\">Stakeholder workshops<\u002Fdiv><div style=\"font:400 14px/1.5 Inter;color:#566070;\">Operations, policy and service teams<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\">\n        <div style=\"font:600 13px Inter;letter-spacing:.1em;text-transform:uppercase;color:#1F5CFF;margin-bottom:20px;\">What we learned<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:20px;\">\n          <div style=\"display:flex;gap:20px;\">\n            <div style=\"flex:none;font:600 34px/1 'Bodoni Moda',serif;color:#1F5CFF;\">1<\u002Fdiv>\n            <div><div style=\"font:600 18px/1.35 Inter;margin-bottom:8px;\"><span style=\"background:linear-gradient(180deg,transparent 62%,#C6D3F4 62%);padding:0 .1em;border-radius:1px;box-decoration-break:clone;-webkit-box-decoration-break:clone;\">Fines came from confusion, not cheating.<\u002Fspan><\u002Fdiv><div style=\"font:400 15px/1.6 Inter;color:#566070;\">Users did not know a charge existed, when it was due, or where to pay. For many, the fine was the first message the system ever sent them.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:20px;\">\n            <div style=\"flex:none;font:600 34px/1 'Bodoni Moda',serif;color:#1F5CFF;\">2<\u002Fdiv>\n            <div><div style=\"font:600 18px/1.35 Inter;margin-bottom:8px;\">“Pay a crossing” and “manage my account” are <span style=\"background:linear-gradient(180deg,transparent 62%,#C6D3F4 62%);padding:0 .1em;border-radius:1px;box-decoration-break:clone;-webkit-box-decoration-break:clone;\">different jobs<\u002Fspan>.<\u002Fdiv><div style=\"font:400 15px/1.6 Inter;color:#566070;\">One shared journey hurt both. Most users quit at the ‘choose account type’ step, before they could even start paying.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:20px;\">\n            <div style=\"flex:none;font:600 34px/1 'Bodoni Moda',serif;color:#1F5CFF;\">3<\u002Fdiv>\n            <div><div style=\"font:600 18px/1.35 Inter;margin-bottom:8px;\">People pay on their phones.<\u002Fdiv><div style=\"font:400 15px/1.6 Inter;color:#566070;\">Users search “pay dartford crossing” from the road or the sofa the same evening. It is the most stressful and most important moment in the service.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ DESIGN DIRECTION ============ -->\n<section id=\"direction\" style=\"background:#14181F;color:#EEF1F5;padding:clamp(80px,11vh,136px) 6vw;\">\n  <div style=\"max-width:1160px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"font:600 13px/1 Inter,sans-serif;letter-spacing:.18em;text-transform:uppercase;color:#5E8AFF;margin-bottom:22px;\">Design Direction<\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font:600 clamp(32px,5vw,60px)/1.02 'Playfair Display',serif;letter-spacing:-.01em;margin:0 0 52px;max-width:18ch;\">Four principles shaped every decision<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:2px;background:#2B3340;border:1px solid #2B3340;border-radius:16px;overflow:hidden;\">\n      <div data-reveal=\"\" style=\"background:#1C222C;padding:36px 30px;\">\n        <div style=\"font:600 15px/1 Inter;color:#5E8AFF;margin-bottom:20px;\">01<\u002Fdiv>\n        <div style=\"font:600 22px/1.25 'Playfair Display',serif;color:#fff;margin-bottom:14px;\">Task first, account later<\u002Fdiv>\n        <div style=\"font:400 15px/1.6 Inter;color:#9BA7B7;\">The most urgent job is “I just crossed, let me pay.” Sign-up comes after payment, <span style=\"color:#82D3A2;font-style:normal;\">never before it<\u002Fspan>.<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#1C222C;padding:36px 30px;\">\n        <div style=\"font:600 15px/1 Inter;color:#5E8AFF;margin-bottom:20px;\">02<\u002Fdiv>\n        <div style=\"font:600 22px/1.25 'Playfair Display',serif;color:#fff;margin-bottom:14px;\">Deadlines are design elements<\u002Fdiv>\n        <div style=\"font:400 15px/1.6 Inter;color:#9BA7B7;\">The most important information gets real design attention: one element, exact dates, shown everywhere, not a line of text.<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#1C222C;padding:36px 30px;\">\n        <div style=\"font:600 15px/1 Inter;color:#5E8AFF;margin-bottom:20px;\">03<\u002Fdiv>\n        <div style=\"font:600 22px/1.25 'Playfair Display',serif;color:#fff;margin-bottom:14px;\">No silent states<\u002Fdiv>\n        <div style=\"font:400 15px/1.6 Inter;color:#9BA7B7;\">The system must <span style=\"color:#82D3A2;font-style:normal;\">never hide anything about your account<\u002Fspan>. Every problem is visible, flagged early, and easy to fix.<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#1C222C;padding:36px 30px;\">\n        <div style=\"font:600 15px/1 Inter;color:#5E8AFF;margin-bottom:20px;\">04<\u002Fdiv>\n        <div style=\"font:600 22px/1.25 'Playfair Display',serif;color:#fff;margin-bottom:14px;\">Self-service replaces phone calls<\u002Fdiv>\n        <div style=\"font:400 15px/1.6 Inter;color:#9BA7B7;\">Every common support question gets a screen that answers it. Fewer phone calls was the business case.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SOLUTION 01, QUICK PAY ============ -->\n<section id=\"quickpay\" style=\"padding:clamp(72px,10vh,128px) 6vw;\">\n  <div style=\"max-width:1160px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:14px;margin-bottom:22px;\">\n      <span style=\"font:600 13px/1 Inter;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:#14181F;padding:7px 12px;border-radius:6px;\">Solution 01<\u002Fspan>\n      <span style=\"font:600 13px/1 Inter;letter-spacing:.14em;text-transform:uppercase;color:#1F5CFF;\">The account wall<\u002Fspan>\n    <\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font:600 clamp(30px,4.6vw,54px)/1.04 'Playfair Display',serif;letter-spacing:-.01em;margin:0 0 24px;max-width:20ch;\">An account wall in front of an urgent payment<\u002Fh2>\n    <p data-reveal=\"\" style=\"font:400 clamp(17px,1.4vw,20px)/1.65 Inter,sans-serif;color:#2C333E;max-width:64ch;margin:0 0 30px;\">The most urgent job in the service, “I just crossed, let me pay”, was <span style=\"background:linear-gradient(180deg,transparent 62%,#C6D3F4 62%);padding:0 .1em;border-radius:1px;box-decoration-break:clone;-webkit-box-decoration-break:clone;\">blocked by account steps<\u002Fspan>. One-off drivers had to understand account types before they could pay £2.50. Many gave up, missed the deadline, and were fined.<\u002Fp>\n    <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;gap:10px;margin-bottom:44px;\">\n      <span style=\"font:500 13px Inter;color:#2C48A8;background:#E3E8F7;border:1px solid #C4CFF0;padding:7px 14px;border-radius:999px;\">Addresses problem 1 · invisible obligation<\u002Fspan>\n      <span style=\"font:500 13px Inter;color:#2C48A8;background:#E3E8F7;border:1px solid #C4CFF0;padding:7px 14px;border-radius:999px;\">Problem 5 · scam lookalike sites<\u002Fspan>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"display:grid;grid-template-columns:1.4fr 1fr;gap:24px;align-items:stretch;\">\n      <blockquote style=\"margin:0;background:#14181F;color:#EEF1F5;border-radius:18px;padding:40px 38px;display:flex;flex-direction:column;justify-content:center;\">\n        <div style=\"font:500 clamp(19px,2.1vw,26px)/1.4 'Playfair Display',serif;font-style:italic;color:#E9EEF4;\">“I saw a sign at 70 mph. That evening I searched how to pay, and got asked to choose an account type. I closed the tab thinking I’d do it tomorrow. Tomorrow was too late.”<\u002Fdiv>\n        <div style=\"font:500 14px Inter;color:#767F8E;margin-top:24px;\">Priya · one-off payer · illustrative<\u002Fdiv>\n      <\u002Fblockquote>\n      <div style=\"background:#E7EEFF;border:1px solid #C9D8FF;border-radius:18px;padding:34px 30px;display:flex;flex-direction:column;justify-content:center;\">\n        <div style=\"font:600 13px Inter;letter-spacing:.1em;text-transform:uppercase;color:#1F5CFF;margin-bottom:16px;\">Design goal<\u002Fdiv>\n        <div style=\"font:500 clamp(19px,2vw,24px)/1.35 'Playfair Display',serif;color:#14181F;\">A stranger to the system pays a crossing <span style=\"background:linear-gradient(180deg,transparent 60%,#BFD1FF 60%);padding:0 .1em;border-radius:1px;box-decoration-break:clone;-webkit-box-decoration-break:clone;\">in under two minutes<\u002Fspan>, with zero prior knowledge.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Deep dive 01 · Decision -->\n<section style=\"padding:clamp(40px,6vh,80px) 6vw clamp(20px,4vh,50px);\">\n  <div style=\"max-width:1160px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"font:600 13px/1 Inter,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#1F5CFF;margin-bottom:18px;\">Deep Dive 01 · The Decision<\u002Fdiv>\n    <h3 data-reveal=\"\" style=\"font:600 clamp(26px,3.6vw,42px)/1.05 'Playfair Display',serif;margin:0 0 20px;max-width:22ch;\">One flow or two? The option we rejected<\u002Fh3>\n    <p data-reveal=\"\" style=\"font:400 17px/1.6 Inter;color:#2C333E;max-width:64ch;margin:0 0 40px;\"><strong style=\"color:#14181F;\">The evidence:<\u002Fstrong> most users quit at the ‘choose account type’ step, before they even reached a payment field. Most fines went to occasional drivers, not repeat offenders.<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;\">\n      <div data-reveal=\"\" style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:18px;padding:32px 30px;position:relative;opacity:.92;\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;\">\n          <div style=\"font:600 13px Inter;letter-spacing:.08em;text-transform:uppercase;color:#636D7D;\">Option A, Unified wizard<\u002Fdiv>\n          <span style=\"font:600 11px Inter;letter-spacing:.1em;color:#E5484D;background:#FBE0E1;border:1px solid #F0B4B7;padding:5px 10px;border-radius:6px;\">REJECTED<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font:400 15px/1.55 Inter;color:#566070;margin-bottom:20px;\">One journey for everyone, splitting into guest or account paths near the end.<\u002Fdiv>\n        <div style=\"font:600 13px Inter;color:#B0273A;margin-bottom:10px;\">Why it lost<\u002Fdiv>\n        <ul style=\"margin:0;padding-left:18px;font:400 14px/1.7 Inter;color:#566070;\">\n          <li>Hid the urgent ‘just pay’ job behind account steps<\u002Fli>\n          <li>Repeated the exact step where users quit<\u002Fli>\n          <li>Simple for the system, hard for the user<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#14181F;color:#EEF1F5;border-radius:18px;padding:32px 30px;position:relative;\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;\">\n          <div style=\"font:600 13px Inter;letter-spacing:.08em;text-transform:uppercase;color:#5E8AFF;\">Option B, Split entry<\u002Fdiv>\n          <span style=\"font:600 11px Inter;letter-spacing:.1em;color:#0E3018;background:#86D3A0;padding:5px 10px;border-radius:6px;\">CHOSEN<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font:400 15px/1.55 Inter;color:#A3AFBF;margin-bottom:20px;\">Quick Pay as the main button for one-off payers; Account as a separate path for commuters and fleets.<\u002Fdiv>\n        <div style=\"font:600 13px Inter;color:#86D3A0;margin-bottom:10px;\">Why it won, and its trade-off<\u002Fdiv>\n        <ul style=\"margin:0;padding-left:18px;font:400 14px/1.7 Inter;color:#C3CCD8;\">\n          <li>Each audience gets a journey shaped for its job<\u002Fli>\n          <li>A worried payer reaches the number-plate field in one click<\u002Fli>\n          <li>Cost: some duplicate parts, solved with a shared component library<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p data-reveal=\"\" style=\"font:400 16px/1.6 Inter;color:#2C333E;max-width:70ch;margin:28px auto 0;text-align:center;font-style:italic;\">The trade-off, honestly: the split creates some duplicate work. We accepted that cost, because the other option <span style=\"background:linear-gradient(180deg,transparent 62%,#C6D3F4 62%);padding:0 .1em;border-radius:1px;box-decoration-break:clone;-webkit-box-decoration-break:clone;\">cost users £70<\u002Fspan>.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Deep dive 01 · Before / After -->\n<section style=\"padding:clamp(40px,6vh,70px) 6vw;\">\n  <div style=\"max-width:1160px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"margin-bottom:34px;\">\n      <div style=\"font:600 13px/1 Inter;letter-spacing:.14em;text-transform:uppercase;color:#1F5CFF;margin-bottom:16px;\">Deep Dive 01 · Before / After<\u002Fdiv>\n      <h3 style=\"font:600 clamp(26px,3.6vw,42px)/1.05 'Playfair Display',serif;margin:0;max-width:22ch;\">From an account wall to three steps<\u002Fh3>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;gap:20px;\">\n      <div data-reveal=\"\" style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:20px;padding:clamp(24px,4vw,40px);\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:26px;flex-wrap:wrap;\"><span style=\"font:600 13px Inter;color:#E5484D;background:#FBE0E1;border:1px solid #F0B4B7;padding:6px 12px;border-radius:999px;\">Before · Legacy journey<\u002Fspan><span style=\"font:500 14px Inter;color:#636D7D;\">6 steps · registration before payment<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:10px;\">\n          <span style=\"font:500 15px Inter;background:#fff;border:1px solid #D6DCE4;border-radius:10px;padding:14px 18px;\">Landing<\u002Fspan><span style=\"color:#767F8E;\">→<\u002Fspan>\n          <span style=\"position:relative;font:600 15px Inter;color:#B0273A;background:#FBE0E1;border:1px solid #E5484D;border-radius:10px;padding:14px 18px;margin-bottom:22px;\">Choose account type<span style=\"position:absolute;left:0;top:calc(100% + 8px);white-space:nowrap;font:500 12px Inter;color:#E5484D;\">Most users quit here<\u002Fspan><\u002Fspan><span style=\"color:#767F8E;\">→<\u002Fspan>\n          <span style=\"font:500 15px Inter;background:#fff;border:1px solid #D6DCE4;border-radius:10px;padding:14px 18px;\">Register &amp; verify<\u002Fspan><span style=\"color:#767F8E;\">→<\u002Fspan>\n          <span style=\"font:500 15px Inter;background:#fff;border:1px solid #D6DCE4;border-radius:10px;padding:14px 18px;\">Add vehicle<\u002Fspan><span style=\"color:#767F8E;\">→<\u002Fspan>\n          <span style=\"font:500 15px Inter;background:#fff;border:1px solid #D6DCE4;border-radius:10px;padding:14px 18px;\">Payment set-up<\u002Fspan><span style=\"color:#767F8E;\">→<\u002Fspan>\n          <span style=\"font:500 15px Inter;background:#fff;border:1px solid #D6DCE4;border-radius:10px;padding:14px 18px;\">Pay<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#14181F;border-radius:20px;padding:clamp(24px,4vw,40px);\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:26px;flex-wrap:wrap;\"><span style=\"font:600 13px Inter;color:#0E3018;background:#86D3A0;padding:6px 12px;border-radius:999px;\">After · Quick Pay<\u002Fspan><span style=\"font:500 14px Inter;color:#9BA7B7;\">3 steps · registration after payment<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:12px;\">\n          <span style=\"font:600 16px Inter;color:#14181F;background:#fff;border:1.5px solid #fff;border-radius:12px;padding:16px 24px;\">1 · Vehicle<\u002Fspan><span style=\"color:#616B7B;\">→<\u002Fspan>\n          <span style=\"font:600 16px Inter;color:#14181F;background:#fff;border:1.5px solid #fff;border-radius:12px;padding:16px 24px;\">2 · Crossings<\u002Fspan><span style=\"color:#616B7B;\">→<\u002Fspan>\n          <span style=\"font:600 16px Inter;color:#FFFFFF;background:#1F5CFF;border-radius:12px;padding:16px 24px;\">3 · Pay<\u002Fspan>\n          <span style=\"font:500 14px Inter;color:#86D3A0;background:#16321F;border:1px solid #275234;border-radius:12px;padding:16px 20px;\">✓ Save your details?, optional, only after payment<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p data-reveal=\"\" style=\"font:400 16px/1.6 Inter;color:#2C333E;max-width:70ch;margin:26px 0 0;\"><strong style=\"color:#14181F;\">Same goal, opposite order:<\u002Fstrong> the old flow asked who you are before taking payment. The new flow <span style=\"background:linear-gradient(180deg,transparent 62%,#B7E4C5 62%);padding:0 .1em;border-radius:1px;box-decoration-break:clone;-webkit-box-decoration-break:clone;\">takes payment first<\u002Fspan>, and offers sign-up as a bonus.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Deep dive 01 · The design (3 steps) -->\n<section style=\"padding:clamp(40px,6vh,70px) 6vw;\">\n  <div style=\"max-width:1160px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"font:600 13px/1 Inter;letter-spacing:.14em;text-transform:uppercase;color:#1F5CFF;margin-bottom:18px;\">Deep Dive 01 · The Design<\u002Fdiv>\n    <h3 data-reveal=\"\" style=\"font:600 clamp(26px,3.6vw,42px)/1.05 'Playfair Display',serif;margin:0 0 40px;max-width:22ch;\">Three steps from stranger to paid<\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;\">\n      <div data-reveal=\"\" style=\"border-top:2px solid #14181F;padding-top:22px;\">\n        <div style=\"font:600 14px Inter;color:#1F5CFF;margin-bottom:10px;\">1 · Vehicle<\u002Fdiv>\n        <div style=\"font:400 15px/1.6 Inter;color:#2C333E;\">The number plate is the only field, styled like a real UK plate. A DVLA lookup shows the car’s make and colour, so typing mistakes are caught before any money moves.<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"border-top:2px solid #14181F;padding-top:22px;\">\n        <div style=\"font:600 14px Inter;color:#1F5CFF;margin-bottom:10px;\">2 · Crossings<\u002Fdiv>\n        <div style=\"font:400 15px/1.6 Inter;color:#2C333E;\">Found crossings are shown as selectable cards, each with its own deadline label. Pay for several at once, or for a future trip.<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"border-top:2px solid #14181F;padding-top:22px;\">\n        <div style=\"font:600 14px Inter;color:#1F5CFF;margin-bottom:10px;\">3 · Pay<\u002Fdiv>\n        <div style=\"font:400 15px/1.6 Inter;color:#2C333E;\">Postcode lookup, very little typing, and a full review before charging. The final screen says clearly: “You’re done, nothing more to do,” with a reference number to keep for 28 days.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"margin-top:26px;background:#E3E8EF;border-radius:14px;padding:24px 28px;font:400 15px/1.6 Inter;color:#2C333E;\"><strong style=\"color:#14181F;\">Sign-up at the right moment.<\u002Fstrong> Creating an account is offered after payment (“Cross often? Save your details”), when the user is relaxed, not in a hurry. There is <span style=\"background:linear-gradient(180deg,transparent 62%,#B7E4C5 62%);padding:0 .1em;border-radius:1px;box-decoration-break:clone;-webkit-box-decoration-break:clone;\">never a sign-up wall<\u002Fspan>. Following GOV.UK rules also protected users: the official style is hard for fake websites to copy.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Deep dive 01 · Anatomy -->\n<section style=\"padding:clamp(40px,6vh,70px) 6vw clamp(72px,10vh,110px);\">\n  <div style=\"max-width:1160px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"font:600 13px/1 Inter;letter-spacing:.14em;text-transform:uppercase;color:#1F5CFF;margin-bottom:18px;\">Deep Dive 01 · Anatomy &amp; Edge Cases<\u002Fdiv>\n    <h3 data-reveal=\"\" style=\"font:600 clamp(26px,3.6vw,42px)/1.05 'Playfair Display',serif;margin:0 0 40px;max-width:24ch;\">The details that prevent the <span style=\"font-family:'Bodoni Moda',serif;\">£70<\u002Fspan> mistake<\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:36px;align-items:start;\">\n      <div data-reveal=\"\">\n        <div style=\"font:600 13px Inter;letter-spacing:.08em;text-transform:uppercase;color:#636D7D;margin-bottom:18px;\">Step 1 anatomy · Vehicle registration<\u002Fdiv>\n        <div style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:18px;padding:30px;\">\n          <div style=\"background:#F5D200;border:2px solid #14181F;border-radius:10px;padding:16px 22px;text-align:center;font:700 34px/1 'Inter',sans-serif;letter-spacing:.08em;color:#111;\">AB12 CDE<\u002Fdiv>\n          <div style=\"text-align:center;font:500 15px Inter;color:#2C333E;margin-top:16px;\">Ford Focus · Blue<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;justify-content:center;margin-top:18px;\">\n            <span style=\"font:600 14px Inter;color:#fff;background:#14181F;border-radius:8px;padding:10px 22px;\">Yes, that’s mine<\u002Fspan>\n            <span style=\"font:600 14px Inter;color:#14181F;background:#fff;border:1px solid #D6DCE4;border-radius:8px;padding:10px 22px;\">No<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font:400 12.5px/1.5 Inter;color:#767F8E;text-align:center;margin-top:18px;\">Auto-uppercase · space-tolerant · registration keyboard · international formats accepted<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"display:flex;flex-direction:column;gap:14px;\">\n        <div style=\"font:600 13px Inter;letter-spacing:.08em;text-transform:uppercase;color:#636D7D;margin-bottom:4px;\">Designed unhappy paths<\u002Fdiv>\n        <div style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:12px;padding:18px 20px;\"><div style=\"font:600 15px Inter;margin-bottom:5px;\">Protection against wrong dates<\u002Fdiv><div style=\"font:400 14px/1.5 Inter;color:#566070;\">Pick a date with no recorded crossing and an extra screen asks you to confirm plate, date and direction, paying for the wrong date leaves the real crossing unpaid.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:12px;padding:18px 20px;\"><div style=\"font:600 15px Inter;margin-bottom:5px;\">Honest about slow data<\u002Fdiv><div style=\"font:400 14px/1.5 Inter;color:#566070;\">Crossings can take time to appear, so manual entry always stays available and the screen says data may be delayed.<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:12px;padding:18px 20px;\"><div style=\"font:600 15px Inter;margin-bottom:5px;\">Errors always show the next step<\u002Fdiv><div style=\"font:400 14px/1.5 Inter;color:#566070;\">“We couldn’t find that plate, check the format or enter details manually.” Every error tells the user what to do next.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SOLUTION 02, DEADLINE ============ -->\n<section id=\"deadline\" style=\"background:#14181F;color:#EEF1F5;padding:clamp(72px,10vh,128px) 6vw;\">\n  <div style=\"max-width:1160px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:14px;margin-bottom:22px;\">\n      <span style=\"font:600 13px/1 Inter;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:#1F5CFF;padding:7px 12px;border-radius:6px;\">Solution 02<\u002Fspan>\n      <span style=\"font:600 13px/1 Inter;letter-spacing:.14em;text-transform:uppercase;color:#1F5CFF;\">The invisible deadline<\u002Fspan>\n    <\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font:600 clamp(30px,4.6vw,54px)/1.04 'Playfair Display',serif;letter-spacing:-.01em;margin:0 0 24px;max-width:20ch;\">A deadline that was easy to miss<\u002Fh2>\n    <p data-reveal=\"\" style=\"font:400 clamp(17px,1.4vw,20px)/1.65 Inter,sans-serif;color:#A3AFBF;max-width:64ch;margin:0 0 44px;\">The whole fine system depends on one rule, pay by midnight the day after you cross. But it was just a line of text. Users could not turn “the day after” into a real date, and late payments turned £2.50 into £70.<\u002Fp>\n    <div data-reveal=\"\" style=\"display:grid;grid-template-columns:1.4fr 1fr;gap:24px;\">\n      <blockquote style=\"margin:0;background:#20262F;border-radius:18px;padding:40px 38px;\">\n        <div style=\"font:500 clamp(19px,2.1vw,26px)/1.4 'Playfair Display',serif;font-style:italic;color:#E9EEF4;\">“I crossed on Saturday for a wedding. Sunday evening I thought, I’ll sort it Monday. The deadline was Sunday midnight. Nothing I saw ever told me that as an actual date.”<\u002Fdiv>\n        <div style=\"font:500 14px Inter;color:#767F8E;margin-top:24px;\">Marcus · weekend traveller · illustrative<\u002Fdiv>\n      <\u002Fblockquote>\n      <div style=\"background:#E7EEFF;border:1px solid #C9D8FF;color:#14181F;border-radius:18px;padding:34px 30px;display:flex;flex-direction:column;justify-content:center;\">\n        <div style=\"font:600 13px Inter;letter-spacing:.1em;text-transform:uppercase;color:#1F5CFF;margin-bottom:16px;\">Design goal<\u002Fdiv>\n        <div style=\"font:500 clamp(19px,2vw,24px)/1.35 'Playfair Display',serif;\">No user can move through the service without knowing exactly when payment is due, <span style=\"background:linear-gradient(180deg,transparent 60%,#BFD1FF 60%);padding:0 .1em;border-radius:1px;box-decoration-break:clone;-webkit-box-decoration-break:clone;\">as a date, not a rule<\u002Fspan>.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Deep dive 02 · Component (four states) -->\n<section style=\"padding:clamp(72px,10vh,120px) 6vw;\">\n  <div style=\"max-width:1160px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"font:600 13px/1 Inter;letter-spacing:.14em;text-transform:uppercase;color:#1F5CFF;margin-bottom:18px;\">Deep Dive 02 · The Component<\u002Fdiv>\n    <h3 data-reveal=\"\" style=\"font:600 clamp(26px,3.6vw,42px)/1.05 'Playfair Display',serif;margin:0 0 20px;max-width:22ch;\">One component, four states<\u002Fh3>\n    <p data-reveal=\"\" style=\"font:400 17px/1.6 Inter;color:#2C333E;max-width:64ch;margin:0 0 40px;\">The rule became a design component, created once, shown everywhere, <span style=\"background:linear-gradient(180deg,transparent 62%,#B7E4C5 62%);padding:0 .1em;border-radius:1px;box-decoration-break:clone;-webkit-box-decoration-break:clone;\">always as an exact date<\u002Fspan>.<\u002Fp>\n\n    <div data-reveal=\"\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;\">\n      <div style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:16px;padding:26px 24px;\">\n        <div style=\"display:inline-flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;background:#E3E8EF;border:1px solid #D6DCE4;color:#2A313C;margin-bottom:18px;\"><span style=\"width:24px;height:24px;border-radius:50%;background:#636D7D;color:#fff;display:inline-flex;align-items:center;justify-content:center;font:700 13px Inter;flex:none;\">•<\u002Fspan><span style=\"font:600 15px Inter;\">Due by 23:59, Tue 14 Mar<\u002Fspan><\u002Fdiv>\n        <div style=\"font:600 13px Inter;letter-spacing:.08em;text-transform:uppercase;color:#636D7D;margin-bottom:8px;\">Upcoming<\u002Fdiv>\n        <div style=\"font:400 15px/1.55 Inter;color:#2C333E;\">Neutral. The exact date is shown from the very start, never “tomorrow.”<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:16px;padding:26px 24px;\">\n        <div style=\"display:inline-flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;background:#FBEECF;border:1px solid #E1B24A;color:#8A5E15;margin-bottom:18px;\"><span style=\"width:24px;height:24px;border-radius:50%;background:#B7791F;color:#fff;display:inline-flex;align-items:center;justify-content:center;font:700 13px Inter;flex:none;\">!<\u002Fspan><span style=\"font:600 15px Inter;\">Due today by 23:59<\u002Fspan><\u002Fdiv>\n        <div style=\"font:600 13px Inter;letter-spacing:.08em;text-transform:uppercase;color:#636D7D;margin-bottom:8px;\">Due today<\u002Fdiv>\n        <div style=\"font:400 15px/1.55 Inter;color:#2C333E;\">Warning style. The last safe moment, made loud and clear.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:16px;padding:26px 24px;\">\n        <div style=\"display:inline-flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;background:#FBE0E1;border:1px solid #E5484D;color:#B0273A;margin-bottom:18px;\"><span style=\"width:24px;height:24px;border-radius:50%;background:#E5484D;color:#fff;display:inline-flex;align-items:center;justify-content:center;font:700 13px Inter;flex:none;\">!<\u002Fspan><span style=\"font:600 15px Inter;\">Past deadline, see what to do<\u002Fspan><\u002Fdiv>\n        <div style=\"font:600 13px Inter;letter-spacing:.08em;text-transform:uppercase;color:#636D7D;margin-bottom:8px;\">Overdue<\u002Fdiv>\n        <div style=\"font:400 15px/1.55 Inter;color:#2C333E;\">Never blames the user, it links to help about fines. A dead end here costs £105.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:16px;padding:26px 24px;\">\n        <div style=\"display:inline-flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;background:#DBF1E4;border:1px solid #2E9E6B;color:#1E6B45;margin-bottom:18px;\"><span style=\"width:24px;height:24px;border-radius:50%;background:#2E9E6B;color:#fff;display:inline-flex;align-items:center;justify-content:center;font:700 13px Inter;flex:none;\">✓<\u002Fspan><span style=\"font:600 15px Inter;\">Paid · ref DC-48291<\u002Fspan><\u002Fdiv>\n        <div style=\"font:600 13px Inter;letter-spacing:.08em;text-transform:uppercase;color:#636D7D;margin-bottom:8px;\">Paid<\u002Fdiv>\n        <div style=\"font:400 15px/1.55 Inter;color:#2C333E;\">The worry ends here, paid, with proof attached.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"margin-top:24px;background:#14181F;color:#E9EEF4;border-radius:14px;padding:24px 28px;font:400 15px/1.6 Inter;\"><strong style=\"color:#1F5CFF;\">Built for accessibility:<\u002Fstrong> status is never shown by colour alone, every label uses colour + icon + text. This small component became the standard for the whole product.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Deep dive 02 · The system -->\n<section style=\"padding:0 6vw clamp(72px,10vh,110px);\">\n  <div style=\"max-width:1160px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"font:600 13px/1 Inter;letter-spacing:.14em;text-transform:uppercase;color:#1F5CFF;margin-bottom:18px;\">Deep Dive 02 · The System<\u002Fdiv>\n    <h3 data-reveal=\"\" style=\"font:600 clamp(24px,3.2vw,38px)/1.06 'Playfair Display',serif;margin:0 0 34px;max-width:26ch;\">Where it appears, and the rules it follows<\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-bottom:24px;\">\n      <div data-reveal=\"\" style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:14px;padding:22px;\"><div style=\"font:600 30px/1 'Bodoni Moda',serif;color:#1F5CFF;margin-bottom:14px;\">1<\u002Fdiv><div style=\"font:600 15px Inter;margin-bottom:6px;\">Landing<\u002Fdiv><div style=\"font:400 14px/1.5 Inter;color:#566070;\">“Crossed today? You have until midnight tomorrow.”<\u002Fdiv><\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:14px;padding:22px;\"><div style=\"font:600 30px/1 'Bodoni Moda',serif;color:#1F5CFF;margin-bottom:14px;\">2<\u002Fdiv><div style=\"font:600 15px Inter;margin-bottom:6px;\">Selection<\u002Fdiv><div style=\"font:400 14px/1.5 Inter;color:#566070;\">Every crossing card has its own label, different crossings can have different deadlines.<\u002Fdiv><\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:14px;padding:22px;\"><div style=\"font:600 30px/1 'Bodoni Moda',serif;color:#1F5CFF;margin-bottom:14px;\">3<\u002Fdiv><div style=\"font:600 15px Inter;margin-bottom:6px;\">Review &amp; pay<\u002Fdiv><div style=\"font:400 14px/1.5 Inter;color:#566070;\">Repeated at the payment step, right next to the amount.<\u002Fdiv><\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:14px;padding:22px;\"><div style=\"font:600 30px/1 'Bodoni Moda',serif;color:#1F5CFF;margin-bottom:14px;\">4<\u002Fdiv><div style=\"font:600 15px Inter;margin-bottom:6px;\">Confirmation<\u002Fdiv><div style=\"font:400 14px/1.5 Inter;color:#566070;\">Labels change to Paid, with the reference number attached.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;\">\n      <div data-reveal=\"\" style=\"background:#E3E8EF;border-radius:14px;padding:24px 26px;\"><div style=\"font:600 15px Inter;color:#1F5CFF;margin-bottom:8px;\">The exact-date rule<\u002Fdiv><div style=\"font:400 14.5px/1.6 Inter;color:#2C333E;\">“By 23:59, Tue 14 Mar”, never “by tomorrow.” Vague wording was the problem, so the component does not allow it. The system calculates the date, so long trips cannot confuse the maths.<\u002Fdiv><\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#E3E8EF;border-radius:14px;padding:24px 26px;\"><div style=\"font:600 15px Inter;color:#1F5CFF;margin-bottom:8px;\">Email reminders<\u002Fdiv><div style=\"font:400 14.5px/1.6 Inter;color:#2C333E;\">Users who pay in advance can ask for an email reminder before the deadline, so help arrives at the moment they need it.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <p data-reveal=\"\" style=\"font:400 13px/1.6 Inter;color:#767F8E;margin:22px 0 0;font-style:italic;\">Testing result: after the redesign, users could state their exact payment deadline without being asked. [Replace with your verified finding.]<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SOLUTION 03, MOBILE ============ -->\n<section id=\"mobile\" style=\"padding:clamp(72px,10vh,128px) 6vw;background:#E3E8EF;\">\n  <div style=\"max-width:1160px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:14px;margin-bottom:22px;\">\n      <span style=\"font:600 13px/1 Inter;letter-spacing:.14em;text-transform:uppercase;color:#fff;background:#14181F;padding:7px 12px;border-radius:6px;\">Solution 03<\u002Fspan>\n      <span style=\"font:600 13px/1 Inter;letter-spacing:.14em;text-transform:uppercase;color:#1F5CFF;\">Mobile is the moment<\u002Fspan>\n    <\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font:600 clamp(30px,4.6vw,54px)/1.04 'Playfair Display',serif;letter-spacing:-.01em;margin:0 0 24px;max-width:18ch;\">A desktop form on a phone screen<\u002Fh2>\n    <p data-reveal=\"\" style=\"font:400 clamp(17px,1.4vw,20px)/1.65 Inter,sans-serif;color:#2C333E;max-width:64ch;margin:0 0 40px;\">Most people pay on their phones, the same evening, sometimes at a petrol station. But the old design was a desktop page <span style=\"background:linear-gradient(180deg,transparent 62%,#C6D3F4 62%);padding:0 .1em;border-radius:1px;box-decoration-break:clone;-webkit-box-decoration-break:clone;\">squeezed onto a phone<\u002Fspan>: crowded forms, small buttons, and the deadline hidden off-screen.<\u002Fp>\n    <div data-reveal=\"\" style=\"display:grid;grid-template-columns:1.4fr 1fr;gap:24px;\">\n      <blockquote style=\"margin:0;background:#fff;border:1px solid #D6DCE4;border-radius:18px;padding:36px 34px;\">\n        <div style=\"font:500 clamp(18px,2vw,24px)/1.4 'Playfair Display',serif;font-style:italic;color:#1C222C;\">“One hand on the phone, low battery, patchy signal, twenty minutes to the deadline. Every extra tap felt like a risk.”<\u002Fdiv>\n        <div style=\"font:500 14px Inter;color:#767F8E;margin-top:22px;\">Same-evening payer · illustrative<\u002Fdiv>\n      <\u002Fblockquote>\n      <div style=\"background:#E7EEFF;border:1px solid #C9D8FF;color:#14181F;border-radius:18px;padding:34px 30px;display:flex;flex-direction:column;justify-content:center;\">\n        <div style=\"font:600 13px Inter;letter-spacing:.1em;text-transform:uppercase;color:#1F5CFF;margin-bottom:16px;\">Design goal<\u002Fdiv>\n        <div style=\"font:500 clamp(18px,1.9vw,23px)/1.35 'Playfair Display',serif;\">Treat the phone as <span style=\"background:linear-gradient(180deg,transparent 60%,#BFD1FF 60%);padding:0 .1em;border-radius:1px;box-decoration-break:clone;-webkit-box-decoration-break:clone;\">the primary payment device<\u002Fspan>, designed for the stressed, one-handed, interrupted session.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Deep dive 03 · design (phone) -->\n<section style=\"padding:clamp(72px,10vh,120px) 6vw;\">\n  <div style=\"max-width:1160px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"font:600 13px/1 Inter;letter-spacing:.14em;text-transform:uppercase;color:#1F5CFF;margin-bottom:18px;\">Deep Dive 03 · The Design<\u002Fdiv>\n    <h3 data-reveal=\"\" style=\"font:600 clamp(26px,3.6vw,42px)/1.05 'Playfair Display',serif;margin:0 0 44px;max-width:24ch;\">Built for one hand, one question, one look<\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:300px 1fr;gap:clamp(30px,5vw,64px);align-items:center;\">\n      <div data-reveal=\"\" style=\"justify-self:center;\">\n        <div style=\"width:290px;background:#14181F;border-radius:38px;padding:12px;box-shadow:0 30px 60px -20px rgba(20,18,12,.45);\">\n          <div style=\"background:#EEF1F5;border-radius:28px;overflow:hidden;\">\n            <div style=\"background:#FBEECF;border-bottom:1px solid #EAD08C;padding:14px 18px;display:flex;align-items:center;gap:10px;\"><span style=\"width:20px;height:20px;border-radius:50%;background:#B7791F;color:#fff;display:inline-flex;align-items:center;justify-content:center;font:700 12px Inter;\">!<\u002Fspan><span style=\"font:600 14px Inter;color:#8A5E15;\">Due today by 23:59<\u002Fspan><\u002Fdiv>\n            <div style=\"padding:24px 20px 20px;\">\n              <div style=\"font:600 13px Inter;color:#636D7D;margin-bottom:12px;\">Vehicle registration<\u002Fdiv>\n              <div style=\"background:#F5D200;border:2px solid #14181F;border-radius:8px;padding:12px;text-align:center;font:700 26px/1 Inter;letter-spacing:.06em;color:#111;\">AB12 CDE<\u002Fdiv>\n              <div style=\"text-align:center;font:500 14px Inter;color:#2C333E;margin-top:12px;\">Ford Focus · Blue<\u002Fdiv>\n              <div style=\"text-align:center;font:400 13px Inter;color:#767F8E;margin-top:6px;\">Is this your vehicle?<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:16px 20px 22px;border-top:1px solid #DBE1EA;\"><div style=\"background:#14181F;color:#fff;border-radius:10px;text-align:center;padding:15px;font:600 16px Inter;\">Continue<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:22px;\">\n        <div data-reveal=\"\"><div style=\"font:600 16px Inter;color:#14181F;margin-bottom:8px;\">Sticky deadline header<\u002Fdiv><div style=\"font:400 14.5px/1.6 Inter;color:#2C333E;\">The deadline stays in a thin header at the top, scrolling never hides the most important information.<\u002Fdiv><\u002Fdiv>\n        <div data-reveal=\"\"><div style=\"font:600 16px Inter;color:#14181F;margin-bottom:8px;\">The plate as a physical object<\u002Fdiv><div style=\"font:400 14.5px/1.6 Inter;color:#2C333E;\">Yellow background, plate-style letters, the right keyboard. Users type what they see on their car, fewer mistakes.<\u002Fdiv><\u002Fdiv>\n        <div data-reveal=\"\"><div style=\"font:600 16px Inter;color:#14181F;margin-bottom:8px;\">Thumb-zone architecture<\u002Fdiv><div style=\"font:400 14.5px/1.6 Inter;color:#2C333E;\">The main button is fixed at the bottom; one question per screen. Easy to reach with a thumb.<\u002Fdiv><\u002Fdiv>\n        <div data-reveal=\"\"><div style=\"font:600 16px Inter;color:#14181F;margin-bottom:8px;\">Less typing everywhere<\u002Fdiv><div style=\"font:400 14.5px/1.6 Inter;color:#2C333E;\">DVLA lookup, postcode lookup, card scan by camera, number keyboards, less typing means fewer errors.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"margin-top:44px;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;\">\n      <div style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:14px;padding:22px 24px;\"><div style=\"font:600 15px Inter;margin-bottom:6px;\">Interruption resilience<\u002Fdiv><div style=\"font:400 14px/1.55 Inter;color:#566070;\">Calls, notifications, tunnels: progress is saved and users continue where they stopped. When failure means a £70 fine, “start again” is not acceptable.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:14px;padding:22px 24px;\"><div style=\"font:600 15px Inter;margin-bottom:6px;\">Fast on weak networks<\u002Fdiv><div style=\"font:400 14px/1.55 Inter;color:#566070;\">Light, fast screens, simple fonts, few images, for weak-signal areas. The user who needs it most often has the worst signal.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:14px;padding:22px 24px;\"><div style=\"font:600 15px Inter;margin-bottom:6px;\">The stressed wrong tap<\u002Fdiv><div style=\"font:400 14px/1.55 Inter;color:#566070;\">Big touch targets, larger than the minimum; risky buttons kept away from where the thumb rests. A user in a hurry taps the wrong thing more often.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CHECK YOUR CROSSINGS ============ -->\n<section id=\"check\" style=\"background:#14181F;color:#EEF1F5;padding:clamp(72px,10vh,128px) 6vw;\">\n  <div style=\"max-width:1160px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"font:600 13px/1 Inter;letter-spacing:.14em;text-transform:uppercase;color:#1F5CFF;margin-bottom:18px;\">Solution Snapshot · “Check your crossings”<\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font:600 clamp(30px,4.6vw,54px)/1.04 'Playfair Display',serif;letter-spacing:-.01em;margin:0 0 22px;max-width:18ch;\">Reassurance without a login<\u002Fh2>\n    <p data-reveal=\"\" style=\"font:400 clamp(17px,1.4vw,20px)/1.65 Inter,sans-serif;color:#A3AFBF;max-width:62ch;margin:0 0 40px;\">It’s 11:40pm. The deadline is in 20 minutes. The user thinks they paid. Old answer: log in (no account) or call (lines closed). New answer: type your plate, <span style=\"color:#82D3A2;font-style:normal;\">know in 30 seconds<\u002Fspan>, in one of three states.<\u002Fp>\n\n    <div data-reveal=\"\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;\">\n      <div style=\"background:#DBF1E4;border:1px solid #A6DCBE;border-radius:16px;padding:26px 26px;\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:24px;height:24px;border-radius:50%;background:#2E9E6B;color:#fff;display:inline-flex;align-items:center;justify-content:center;font:700 13px Inter;flex:none;\">✓<\u002Fspan><span style=\"font:700 13px Inter;letter-spacing:.12em;text-transform:uppercase;color:#1E6B45;\">Paid<\u002Fspan><\u002Fdiv>\n        <div style=\"font:600 clamp(18px,2vw,22px)/1.3 'Playfair Display',serif;color:#14181F;margin-bottom:12px;\">This crossing is already paid.<\u002Fdiv>\n        <div style=\"font:500 15px Inter;color:#2A313C;\">Reference DC-48291<\u002Fdiv>\n        <div style=\"font:500 15px Inter;color:#2A313C;margin-bottom:12px;\">Paid 11 Jul 2026, 21:04<\u002Fdiv>\n        <div style=\"font:400 13.5px/1.55 Inter;color:#566070;\">Shows the reference and payment date, proof in hand if a fine arrives by mistake.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#FBEECF;border:1px solid #EAD08C;border-radius:16px;padding:26px 26px;\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:24px;height:24px;border-radius:50%;background:#B7791F;color:#fff;display:inline-flex;align-items:center;justify-content:center;font:700 13px Inter;flex:none;\">!<\u002Fspan><span style=\"font:700 13px Inter;letter-spacing:.12em;text-transform:uppercase;color:#8A5E15;\">Due<\u002Fspan><\u002Fdiv>\n        <div style=\"font:600 clamp(18px,2vw,22px)/1.3 'Playfair Display',serif;color:#14181F;margin-bottom:12px;\">Payment is due for this vehicle.<\u002Fdiv>\n        <div style=\"font:500 15px Inter;color:#2A313C;\">Crossing on 11 Jul 2026<\u002Fdiv>\n        <div style=\"font:500 15px Inter;color:#2A313C;margin-bottom:14px;\">Due by 23:59, Sun 13 Jul<\u002Fdiv>\n        <div style=\"display:inline-block;background:#14181F;color:#fff;border-radius:10px;padding:11px 22px;font:600 14px Inter;margin-bottom:12px;\">Pay now →<\u002Fdiv>\n        <div style=\"font:400 13.5px/1.55 Inter;color:#566070;\">A Pay now button opens Quick Pay with the crossing already selected. Never a dead end.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#EEF1F5;border:1px solid #D6DCE4;border-radius:16px;padding:26px 26px;\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;\"><span style=\"width:24px;height:24px;border-radius:50%;background:#636D7D;color:#fff;display:inline-flex;align-items:center;justify-content:center;font:700 13px Inter;flex:none;\">?<\u002Fspan><span style=\"font:700 13px Inter;letter-spacing:.12em;text-transform:uppercase;color:#566070;\">Not found<\u002Fspan><\u002Fdiv>\n        <div style=\"font:600 clamp(18px,2vw,22px)/1.3 'Playfair Display',serif;color:#14181F;margin-bottom:12px;\">No crossing found for that plate.<\u002Fdiv>\n        <div style=\"font:500 15px Inter;color:#2A313C;margin-bottom:14px;\">Crossings can take a while to appear.<\u002Fdiv>\n        <div style=\"font:400 13.5px/1.55 Inter;color:#566070;\">Honest guidance: data can be delayed, what that means, and how to pay manually.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin-top:24px;\">\n      <div data-reveal=\"\" style=\"background:#1C222C;border-radius:14px;padding:22px 24px;\"><div style=\"font:600 15px Inter;color:#1F5CFF;margin-bottom:6px;\">No login needed<\u002Fdiv><div style=\"font:400 14px/1.55 Inter;color:#A3AFBF;\">A stressed user at midnight should not face a password reset. The search shows only crossing status, no personal data, so no login is safe.<\u002Fdiv><\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#1C222C;border-radius:14px;padding:22px 24px;\"><div style=\"font:600 15px Inter;color:#1F5CFF;margin-bottom:6px;\">Never a dead end<\u002Fdiv><div style=\"font:400 14px/1.55 Inter;color:#A3AFBF;\">Due shows a Pay now button that opens Quick Pay with the crossing already selected. Not found gives honest guidance on delayed data and manual payment.<\u002Fdiv><\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#1C222C;border-radius:14px;padding:22px 24px;\"><div style=\"font:600 15px Inter;color:#1F5CFF;margin-bottom:6px;\">Built to replace phone calls<\u002Fdiv><div style=\"font:400 14px/1.55 Inter;color:#A3AFBF;\">“Did my payment go through?” was one of the top support questions. Fewer phone calls was the business case.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ACCOUNT HEALTH ============ -->\n<section id=\"account\" style=\"padding:clamp(72px,10vh,128px) 6vw;\">\n  <div style=\"max-width:1160px;margin:0 auto;\">\n    <div data-reveal=\"\" style=\"font:600 13px/1 Inter;letter-spacing:.14em;text-transform:uppercase;color:#1F5CFF;margin-bottom:18px;\">Solution Snapshot · Account Health<\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font:600 clamp(30px,4.6vw,54px)/1.04 'Playfair Display',serif;letter-spacing:-.01em;margin:0 0 22px;max-width:20ch;\">A dashboard that can’t stay silent<\u002Fh2>\n    <p data-reveal=\"\" style=\"font:400 clamp(17px,1.4vw,20px)/1.65 Inter,sans-serif;color:#2C333E;max-width:62ch;margin:0 0 40px;\">One look answers “am I covered?”, a healthy account should look boring. These are the three states an account can be in.<\u002Fp>\n\n    <div data-reveal=\"\" style=\"display:grid;gap:14px;\">\n      <div style=\"border-radius:16px;padding:clamp(22px,3vw,32px);background:#DBF1E4;border:1px solid #A6DCBE;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;\">\n          <div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"width:26px;height:26px;border-radius:50%;background:#2E9E6B;color:#fff;display:inline-flex;align-items:center;justify-content:center;font:700 14px Inter;flex:none;\">✓<\u002Fspan><div><div style=\"font:700 13px Inter;letter-spacing:.12em;text-transform:uppercase;color:#1E6B45;\">Active<\u002Fdiv><div style=\"font:500 clamp(16px,1.7vw,20px)/1.4 Inter;color:#14181F;margin-top:6px;\">You’re covered
