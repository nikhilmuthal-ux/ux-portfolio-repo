. Crossings are paid automatically.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-radius:16px;padding:clamp(22px,3vw,32px);background:#FBEECF;border:1px solid #E1B24A;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;\">\n          <div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"width:26px;height:26px;border-radius:50%;background:#B7791F;color:#fff;display:inline-flex;align-items:center;justify-content:center;font:700 14px Inter;flex:none;\">!<\u002Fspan><div><div style=\"font:700 13px Inter;letter-spacing:.12em;text-transform:uppercase;color:#8A5E15;\">Action needed<\u002Fdiv><div style=\"font:500 clamp(16px,1.7vw,20px)/1.4 Inter;color:#14181F;margin-top:6px;\">Your card expires in 12 days, auto top-up will stop working.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:none;background:#14181F;color:#fff;border-radius:10px;padding:13px 24px;font:600 15px Inter;\">Update card<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-radius:16px;padding:clamp(22px,3vw,32px);background:#FBE0E1;border:1px solid #E5484D;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;\">\n          <div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"width:26px;height:26px;border-radius:50%;background:#E5484D;color:#fff;display:inline-flex;align-items:center;justify-content:center;font:700 14px Inter;flex:none;\">!<\u002Fspan><div><div style=\"font:700 13px Inter;letter-spacing:.12em;text-transform:uppercase;color:#B0273A;\">Suspended<\u002Fdiv><div style=\"font:500 clamp(16px,1.7vw,20px)/1.4 Inter;color:#14181F;margin-top:6px;\">Your crossings are NOT being paid. You could receive penalties.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:none;background:#14181F;color:#fff;border-radius:10px;padding:13px 24px;font:600 15px Inter;\">Reactivate<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px;margin-top:24px;\">\n      <div data-reveal=\"\" style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:14px;padding:22px 24px;\"><div style=\"font:600 15px Inter;color:#1F5CFF;margin-bottom:6px;\">Escalating expiry warnings<\u002Fdiv><div style=\"font:400 14px/1.55 Inter;color:#2C333E;\">Warnings at 30, 7 and 1 days before the card expires, on the dashboard and by email. The card can be updated right there.<\u002Fdiv><\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:14px;padding:22px 24px;\"><div style=\"font:600 15px Inter;color:#1F5CFF;margin-bottom:6px;\">Auto top-up as explicit state<\u002Fdiv><div style=\"font:400 14px/1.55 Inter;color:#2C333E;\">Always shown clearly, never hidden. OFF looks like a warning, because OFF means you are not protected.<\u002Fdiv><\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#F5F8FB;border:1px solid #D6DCE4;border-radius:14px;padding:22px 24px;\"><div style=\"font:600 15px Inter;color:#1F5CFF;margin-bottom:6px;\">The transparent ledger<\u002Fdiv><div style=\"font:400 14px/1.55 Inter;color:#2C333E;\">Every top-up, charge, refund and failed payment is one row, with the balance after it and a retry button.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"margin-top:24px;background:#14181F;color:#E9EEF4;border-radius:14px;padding:26px 30px;font:500 clamp(17px,1.8vw,21px)/1.5 'Playfair Display',serif;font-style:italic;\">The rule: the system must <span style=\"color:#82D3A2;font-style:normal;\">never hide anything about your account<\u002Fspan> from you. Every status is visible, flagged early, and easy to fix.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer style=\"background:#14181F;color:#616B7B;padding:40px 6vw;text-align:center;font:400 13px/1.6 Inter;\">\n  DartCharge · Case study draft, problem &amp; solution. Illustrative quotes and interface mock-ups; visuals will be updated to match the final case study design.\n<\u002Ffooter>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:720}}\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const fmt = (v, dec) => {\n      const n = dec ? Number(v).toFixed(dec) : String(Math.round(v));\n      const parts = n.split('.');\n      parts[0] = parts[0].replace(/\\B(?=(\\d{3})+(?!\\d))/g, ',');\n      return parts.join('.');\n    };\n    const cio = new IntersectionObserver((es) => {\n      es.forEach((e) => {\n        if (!e.isIntersecting) return;\n        const el = e.target;\n        cio.unobserve(el);\n        const target = parseFloat(el.dataset.target);\n        const dec = parseInt(el.dataset.decimals || '0', 10);\n        const dur = 1500, t0 = performance.now();\n        const tick = (t) => {\n          const p = Math.min(1, (t - t0) / dur);\n          const eased = 1 - Math.pow(1 - p, 3);\n          el.textContent = fmt(target * eased, dec);\n          if (p < 1) requestAnimationFrame(tick);\n          else el.textContent = fmt(target, dec);\n        };\n        requestAnimationFrame(tick);\n      });\n    }, { threshold: 0.6 });\n    document.querySelectorAll('[data-target]').forEach((el) => cio.observe(el));\n\n    const rio = new IntersectionObserver((es) => {\n      es.forEach((e) => {\n        if (e.isIntersecting) {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          rio.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.08, rootMargin: '0px 0px -6% 0px' });\n    document.querySelectorAll('[data-reveal]').forEach((el, i) => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(26px)';\n      const d = ((i % 3) * 0.06).toFixed(2);\n      el.style.transition = 'opacity .7s cubic-bezier(.2,.7,.2,1) ' + d + 's, transform .7s cubic-bezier(.2,.7,.2,1) ' + d + 's';\n      rio.observe(el);\n    });\n  }\n\n  renderVals() {\n    return {};\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
  <script>
  /* ===== AutoHeightEmbed reporter (injected) =====
     Posts {type:"embed-height", height} to the parent Framer page so the
     AutoHeightEmbed component can grow the iframe to full content height.
     Only active when embedded; standalone viewing is untouched. */
  (function () {
    if (window.self === window.top) return; // standalone: do nothing

    // Kill the internal scrollbar while embedded (parent page scrolls instead)
    var st = document.createElement("style");
    st.textContent = "html{overflow:hidden !important}";
    document.documentElement.appendChild(st);

    var lastSent = 0;

    function measure() {
      // Measure real content, not documentElement.scrollHeight
      // (fixed/decorative elements can inflate it -> phantom scroll space)
      var root = document.querySelector("x-dc");
      var h = 0;
      if (root) {
        var r = root.getBoundingClientRect();
        h = Math.ceil(r.height + Math.max(0, r.top + window.scrollY));
      }
      h = Math.max(h, document.body ? document.body.scrollHeight : 0);
      return h;
    }

    function report() {
      var h = measure();
      if (h > 0 && Math.abs(h - lastSent) > 1) {
        lastSent = h;
        window.parent.postMessage({ type: "embed-height", height: h }, "*");
      }
    }

    // Fire on every meaningful moment
    window.addEventListener("load", report);
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(report).catch(function () {});
    }
    if ("ResizeObserver" in window) {
      var ro = new ResizeObserver(report);
      ro.observe(document.documentElement);
      if (document.body) ro.observe(document.body);
      // x-dc is rendered async by the DC runtime; watch for it
      var mo = new MutationObserver(function () {
        var root = document.querySelector("x-dc");
        if (root) {
          ro.observe(root);
          mo.disconnect();
          report();
        }
      });
      mo.observe(document.documentElement, { childList: true, subtree: true });
    }
    // Safety net: poll during the first 12s (runtime render, images, fonts)
    var n = 0;
    var iv = setInterval(function () {
      report();
      if (++n > 40) clearInterval(iv);
    }, 300);
    report();
  })();
  </script>
</body>
</html>
